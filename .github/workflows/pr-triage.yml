name: PR Context Triage

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to triage"
        required: true
        type: string
      trigger_macroscope:
        description: "Post one @macroscope-app review trigger if allowed"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      force_review:
        description: "Allow a manual re-trigger even if Macroscope was already pinged before"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-context-triage-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Label, link, and optionally trigger review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Run PR context triage
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          TRIGGER_MACROSCOPE: ${{ github.event_name == 'pull_request_target' && 'true' || github.event.inputs.trigger_macroscope }}
          FORCE_REVIEW: ${{ github.event.inputs.force_review || 'false' }}
        with:
          script: |
            const run = require("./.github/scripts/pr-context-triage.js");
            await run({ github, context, core });
