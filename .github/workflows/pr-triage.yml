name: PR Triage

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  issues: write

jobs:
  check-linked-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = "needs linked issue";
            const body = context.payload.pull_request.body || "";
            
            // GitHub supports: fix/fixes/fixed, close/closes/closed, resolve/resolves/resolved
            const hasLink = /\b(?:fix|fixes|fixed|close|closes|closed|resolve|resolves|resolved)\b\s*:?\s*#\d+/i.test(body);
            
            if (!hasLink) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label]
              });
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }
